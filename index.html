<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Data Center & AI Restrictions Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="header">
    <h1>US <span>Data Center &amp; AI Restrictions</span> Map</h1>
    <div id="last-updated">Loading data…</div>
  </header>

  <!-- Dashboard -->
  <section id="dashboard"></section>

  <!-- Search -->
  <div id="search-bar">
    <button id="filter-toggle" aria-label="Toggle map layers" aria-expanded="false">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="9" cy="6" r="1.5" fill="currentColor"/>
        <circle cx="16" cy="12" r="1.5" fill="currentColor"/>
        <circle cx="11" cy="18" r="1.5" fill="currentColor"/>
      </svg>
      <span>Layers</span>
    </button>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"/>
      <path d="M21 21l-4.3-4.3"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search county, state, or facility…" autocomplete="off" />
    <div id="search-results"></div>
    <button id="top-toggle" aria-label="Toggle top panel" title="Show / hide header">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </button>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Map Container -->
    <div id="map-container">
      <svg id="map-svg"></svg>

      <!-- Stats bar -->
      <div id="stats-bar"></div>

      <!-- Filter / layers panel -->
      <div id="filter-panel-backdrop"></div>
      <aside id="filter-panel">
        <div id="filter-panel-header">
          <h3>Map Layers</h3>
          <button id="filter-panel-close" aria-label="Close layers panel">&times;</button>
        </div>
        <div id="filter-panel-body"></div>
      </aside>

      <!-- Legend -->
      <div id="legend"></div>
      <button id="legend-restore" aria-label="Restore legend">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Legend
      </button>

      <!-- Tooltip -->
      <div id="tooltip">
        <div class="tip-name"></div>
        <div class="tip-level"></div>
      </div>

      <!-- Loading overlay -->
      <div id="loading">
        <div class="spinner"></div>
        <span>Loading map data…</span>
      </div>
    </div>

    <!-- Detail Panel -->
    <aside id="detail-panel">
      <div id="detail-panel-handle"></div>
      <div id="detail-header">
        <button id="detail-panel-close" aria-label="Close panel">&times;</button>
        <h2>County Details</h2>
        <div id="detail-state"></div>
      </div>
      <div id="detail-body">
        <div id="detail-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4M12 8h.01"/>
          </svg>
          <p>Click any county on the map to see its restriction details.</p>
        </div>
      </div>
    </aside>

  </div><!-- /main -->

</div><!-- /app -->

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="js/map.js"></script>
</body>
</html>
