name: Monitor Legislation

# ──────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   LEGISCAN_API_KEY  (strongly recommended)
#     Free signup at https://legiscan.com/legiscan
#     Provides full 50-state + federal bill monitoring.
#     Without it only federal bills via Congress.gov are checked.
#
#   CONGRESS_API_KEY  (optional — improves federal coverage)
#     Free signup at https://api.congress.gov/sign-up/
#     Falls back to DEMO_KEY (rate-limited) if not set.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Monday and Thursday at 08:00 UTC
    - cron: "0 8 * * 1"
    - cron: "0 8 * * 4"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run legislative monitor
        id: monitor
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        # Exit 1 means new items were found; continue-on-error lets us capture that
        continue-on-error: true
        run: |
          python data/monitor_legislation.py > /tmp/monitor_output.txt 2>&1
          EXIT_CODE=$?
          cat /tmp/monitor_output.txt
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Extract the issue body section from stdout
          python3 - <<'PYEOF'
          import re, sys
          with open('/tmp/monitor_output.txt') as f:
              txt = f.read()
          m = re.search(r'__ISSUE_BODY_START__\n(.*?)__ISSUE_BODY_END__', txt, re.DOTALL)
          body = m.group(1).strip() if m else ''
          with open('/tmp/issue_body.txt', 'w') as f:
              f.write(body)
          print(f'Issue body length: {len(body)} chars')
          PYEOF

      - name: Commit updated monitoring_seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monitoring_seen.json data/monitoring_report.json
          if git diff --staged --quiet; then
            echo "No changes to monitoring state."
          else
            git commit -m "chore: update legislative monitoring state [skip ci]"
            git push origin main
          fi

      - name: Ensure required labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'legislation-monitor', color: '0075ca', description: 'Flagged by the automated legislative monitor' },
              { name: 'data-review',         color: 'e4e669', description: 'Requires human review before data is updated' },
              { name: 'data-validation',     color: 'd93f0b', description: 'Automated data validation failure' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label });
                  console.log(`Created label: ${label.name}`);
                }
              }
            }

      - name: Create or update GitHub Issue for flagged legislation
        if: steps.monitor.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueBody = fs.readFileSync('/tmp/issue_body.txt', 'utf8').trim();
            if (!issueBody) {
              console.log('No issue body — skipping issue creation.');
              return;
            }

            const today = new Date().toISOString().slice(0, 10);
            const title = `[Legislation Monitor] New bills flagged for review — ${today}`;

            // Check for an existing open monitoring issue (update it instead of spamming)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'legislation-monitor',
              per_page: 5,
            });

            const openMonitor = existing.data.find(i =>
              i.title.startsWith('[Legislation Monitor]')
            );

            if (openMonitor) {
              // Add a new comment with today's digest rather than replacing the issue body
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openMonitor.number,
                body: `## Updated Digest — ${today}\n\n` + issueBody,
              });
              console.log(`Updated existing issue #${openMonitor.number}`);
            } else {
              // Open a fresh issue
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: issueBody + '\n\n---\n_Close this issue once all items have been reviewed._',
                labels: ['legislation-monitor', 'data-review'],
              });
              console.log(`Created issue #${created.data.number}: ${created.data.html_url}`);
            }

      - name: Print summary
        run: |
          EXIT="${{ steps.monitor.outputs.exit_code }}"
          if [ "$EXIT" = "1" ]; then
            echo "⚠️  New legislation flagged — see GitHub Issues for the review digest."
          else
            echo "✓  No new relevant legislation found."
          fi
