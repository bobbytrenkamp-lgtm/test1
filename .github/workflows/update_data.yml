name: Update Restriction Data

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install from requirements.txt if packages are listed
          grep -v '^\s*#' data/requirements.txt | grep -v '^\s*$' | pip install -r /dev/stdin || true

      - name: Run data processing script
        run: python data/process_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/map_data.json
          if git diff --staged --quiet; then
            echo "No changes to data/map_data.json — skipping commit."
          else
            git commit -m "chore: auto-update map data [skip ci]"
            git push
          fi
